name: Agent 2 — Auditor

on:
  # REDUCED — was every 5 min, competing with auto-generate for Groq quota and
  # causing rate-limit cascades. Now weekly (Sunday 4am UTC) as a low-priority sweep.
  # Use workflow_dispatch to run on-demand.
  schedule:
    - cron: '0 4 * * 0'   # weekly — Sunday 4am UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run Audit Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/audit-agent.js
