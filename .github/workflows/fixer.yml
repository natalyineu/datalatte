name: Agent 3 — Fixer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours

concurrency:
  group: fixer
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: ⏱ Job start
        run: |
          echo "========================================"
          echo "🔧 Fixer started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Run ID : $GITHUB_RUN_ID"
          echo "========================================"

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ✅ Checkout done
        run: |
          echo "📂 Repo checked out — $(git rev-parse --short HEAD)"
          python3 -c "
          import json
          try:
            qs = json.load(open('content/quality-scores.json'))
            from datetime import datetime, timedelta, timezone
            cutoff = (datetime.now(timezone.utc) - timedelta(days=30)).isoformat()
            eligible = [
              k for k,v in qs.items()
              if v.get('score',10) < 7
              and (not v.get('improvedAt') or v['improvedAt'] < cutoff)
            ]
            print(f'  Eligible for improvement: {len(eligible)} articles (score<7, not improved in 30d)')
          except Exception as e:
            print(f'  (could not read quality-scores.json: {e})')
          " 2>/dev/null || true

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: ✅ Node ready
        run: echo "🟢 Node $(node -v)"

      - name: Run Fixer Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "----------------------------------------"
          echo "🔧 Running fixer-agent.js…"
          echo "----------------------------------------"
          node scripts/fixer-agent.js 2>&1 | tee /tmp/fixer_output.txt || true

      - name: 📋 Fixer summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/fixer_output.txt 2>/dev/null || echo "")
          REMAINING=$(echo "$OUTPUT" | grep "^FIXER_REMAINING:" | sed 's/FIXER_REMAINING://' | tr -d '[:space:]') || true
          IMPROVED=$(echo "$OUTPUT" | grep "^FIXER_IMPROVED:" | sed 's/FIXER_IMPROVED://' | tr -d '[:space:]') || true
          SKIPPED=$(echo "$OUTPUT" | grep -c "⏭️\|Skipped (validation" || echo "0")
          echo "========================================"
          echo "  Improved  : ${IMPROVED:-0} articles"
          echo "  Skipped   : $SKIPPED articles"
          echo "  Remaining : ${REMAINING:-unknown}"
          echo "----------------------------------------"
          echo "$OUTPUT" | grep -E "(✅ Improved|⏭|⚠️|❌|📝 \[|=== )" | head -20
          echo "========================================"

      - name: Trigger next run if articles remain
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          OUTPUT=$(cat /tmp/fixer_output.txt 2>/dev/null || echo "")
          REMAINING=$(echo "$OUTPUT" | grep "^FIXER_REMAINING:" | sed 's/FIXER_REMAINING://')
          if [ -z "$REMAINING" ] || [ "$REMAINING" = "0" ]; then
            echo "✅ All articles improved — not triggering next run."
          else
            echo "📋 $REMAINING articles still need improvement — triggering next run…"
            gh workflow run fixer.yml --repo natalyineu/datalatte
            echo "✅ Next run queued"
          fi

      - name: 📊 Write job summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/fixer_output.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          REMAINING=$(echo "$OUTPUT" | grep "^FIXER_REMAINING:" | sed 's/FIXER_REMAINING://' | tr -d '[:space:]') || true
          IMPROVED=$(echo "$OUTPUT" | grep "^FIXER_IMPROVED:" | sed 's/FIXER_IMPROVED://' | tr -d '[:space:]') || true
          {
            echo "## 🔧 Fixer — $TIME"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Articles improved | ${IMPROVED:-0} |"
            echo "| Articles skipped (validation) | $(echo "$OUTPUT" | grep -c 'Skipped (validation' || echo 0) |"
            echo "| Remaining in queue | ${REMAINING:-0} |"
            echo ""
            IMPROVED_LIST=$(echo "$OUTPUT" | grep "✅ Improved") || true
            if [ -n "$IMPROVED_LIST" ]; then
              echo "### ✅ Improved this run"
              echo "$OUTPUT" | grep -E "📝 \[|✅ Improved|📝 [0-9]" | paste - - | while read line; do echo "- $line"; done || true
            fi
            SKIPPED_LIST=$(echo "$OUTPUT" | grep "Output too short") || true
            if [ -n "$SKIPPED_LIST" ]; then
              echo "### ⚠️ Skipped (output too short)"
              echo "$SKIPPED_LIST" | while read line; do echo "- $line"; done
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: ⏱ Job end
        if: always()
        run: echo "🏁 Fixer finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
