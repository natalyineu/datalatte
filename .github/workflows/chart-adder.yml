name: Chart Adder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'   # daily at 5am UTC as safety net

concurrency:
  group: chart-adder
  cancel-in-progress: false

jobs:
  add-charts:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run Chart Adder
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/chart-adder.js 2>&1 | tee /tmp/chart_output.txt || true

      - name: Trigger next run if articles remain
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          OUTPUT=$(cat /tmp/chart_output.txt 2>/dev/null || echo "")
          REMAINING=$(echo "$OUTPUT" | grep "^CHARTS_REMAINING:" | sed 's/CHARTS_REMAINING://')
          if [ -z "$REMAINING" ] || [ "$REMAINING" = "0" ]; then
            echo "✅ All articles have charts — not triggering next run."
          else
            echo "📊 $REMAINING articles still need charts — triggering next run..."
            gh workflow run chart-adder.yml --repo natalyineu/datalatte
          fi
