name: Agent 5 — Pipeline Manager

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 50   # need git history to check article age

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run Pipeline Manager
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/pipeline-manager.js
