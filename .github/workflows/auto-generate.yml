name: Auto-generate articles

on:
  schedule:
    # Fallback every 30 min — the post-publish self-chain (see "Trigger next run"
    # step below) drives normal throughput. Firing the cron too often piles up
    # queued runs while the chain is healthy.
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: article-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write

    steps:
      - name: ⏱ Job start
        run: |
          echo "========================================"
          echo "🚀 Auto-generate started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Runner : $RUNNER_NAME"
          echo "  Run ID : $GITHUB_RUN_ID"
          echo "========================================"

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Checkout done
        run: |
          echo "📂 Repo checked out"
          echo "  Branch : $(git rev-parse --abbrev-ref HEAD)"
          echo "  Commit : $(git rev-parse --short HEAD)"
          QUEUE=$(python3 -c "import json; d=json.load(open('content/queue.json')); pending=[x for x in d['queue'] if x.get('status')=='pending']; print(f'  Queue  : {len(pending)} pending articles')" 2>/dev/null || echo "  Queue  : (could not read)")
          echo "$QUEUE"

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: ✅ Node ready
        run: echo "🟢 Node $(node -v) / npm $(npm -v)"

      - name: 🔔 Telegram check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN secret is EMPTY — this is why writer is silent"
            exit 0
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ TELEGRAM_CHAT_ID secret is EMPTY — this is why writer is silent"
            exit 0
          fi
          echo "✅ Token set (${#TELEGRAM_BOT_TOKEN} chars) | Chat: $TELEGRAM_CHAT_ID"
          STATUS=$(curl -s -o /tmp/tg_resp.txt -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"✍️ Writer workflow starting — run #${GITHUB_RUN_NUMBER}\"}")
          echo "Telegram API status: $STATUS"
          cat /tmp/tg_resp.txt
          echo ""

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "----------------------------------------"
          echo "📝 Running generate-articles-workflow.js…"
          echo "----------------------------------------"
          node scripts/generate-articles-workflow.js 2>&1 | tee /tmp/gen_output.txt || true

      - name: 📋 Generate summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          echo "========================================"
          if echo "$OUTPUT" | grep -q "Pushed:"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed:" | sed 's/.*Pushed: //' | tr -d '[:space:]')
            TITLE=$(echo "$OUTPUT" | grep "^ARTICLE_TITLE:" | sed 's/^ARTICLE_TITLE: //')
            MODEL=$(echo "$OUTPUT" | grep "Model used:" | sed 's/.*Model used: //')
            REMAINING=$(echo "$OUTPUT" | grep "^QUEUE_REMAINING:" | sed 's/^QUEUE_REMAINING: //')
            echo "✅ PUBLISHED: $TITLE"
            echo "   Slug     : $SLUG"
            echo "   Model    : $MODEL"
            echo "   Remaining: $REMAINING"
          elif echo "$OUTPUT" | grep -q "No pending"; then
            echo "🏁 Queue empty — nothing to generate"
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|quota exhausted"; then
            echo "⚡ Rate limited — all Groq models busy"
          else
            echo "⚠️  Unexpected output — last 5 lines:"
            echo "$OUTPUT" | tail -5
          fi
          echo "--- Telegram status ---"
          echo "$OUTPUT" | grep "\[Telegram\]" || echo "(no [Telegram] lines found — script may have exited early)"
          echo "========================================"

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "No pending"; then
            echo "🏁 Queue empty — not triggering next run"
          elif echo "$OUTPUT" | grep -q "Pushed:"; then
            echo "🔁 Article(s) published — triggering next run immediately…"
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
            echo "✅ Next run queued"
          else
            echo "⚡ Rate limited / no article published — fallback cron will resume in ≤5 min"
          fi

      - name: 📊 Write job summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## ✍️ Auto-generate — $TIME"
            echo ""
            if echo "$OUTPUT" | grep -q "Pushed:"; then
              TITLE=$(echo "$OUTPUT" | grep "^ARTICLE_TITLE:" | sed 's/^ARTICLE_TITLE: //')
              SLUG=$(echo "$OUTPUT" | grep "Pushed:" | sed 's/.*Pushed: //' | tr -d '[:space:]')
              MODEL=$(echo "$OUTPUT" | grep "Model used:" | sed 's/.*Model used: //')
              REMAINING=$(echo "$OUTPUT" | grep "^QUEUE_REMAINING:" | sed 's/^QUEUE_REMAINING: //')
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Status | ✅ Published |"
              echo "| Title | $TITLE |"
              echo "| URL | [datalatte.pro/blog/$SLUG](https://datalatte.pro/blog/$SLUG) |"
              echo "| Model | $MODEL |"
              echo "| Queue remaining | $REMAINING |"
            elif echo "$OUTPUT" | grep -q "No pending"; then
              echo "🏁 **Queue empty** — no pending articles."
            elif echo "$OUTPUT" | grep -q "quota exhausted\|rate_limit"; then
              echo "⚡ **Rate limited** — all Groq models at quota."
            else
              echo "⚠️ **No article published.** Check logs above."
            fi
          } >> $GITHUB_STEP_SUMMARY


      - name: ⏱ Job end
        if: always()
        run: echo "🏁 Auto-generate finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
