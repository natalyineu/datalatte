name: Auto-generate articles

on:
  schedule:
    - cron: '*/5 * * * *'   # fallback every 5 min in case chain breaks
  workflow_dispatch:

concurrency:
  group: article-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-articles-workflow.js 2>&1 | tee /tmp/gen_output.txt || true

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "No pending"; then
            echo "Queue empty — not triggering next run"
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|unavailable"; then
            echo "Rate limited — waiting 3 min before next run"
            sleep 180
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          else
            echo "Triggering next run in 5 min"
            sleep 300
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          fi

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "Pushed"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed" | sed 's/.*Pushed: //')
            URL="https://www.datalatte.pro/blog/${SLUG}"
            MSG="📝 Article published%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A${URL}"
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|unavailable"; then
            MSG="⏳ Rate limited — retrying in 3 min%0A$(date -u '+%Y-%m-%d %H:%M UTC')"
          elif echo "$OUTPUT" | grep -q "No pending"; then
            MSG="✅ Queue empty%0A$(date -u '+%Y-%m-%d %H:%M UTC')"
          else
            MSG="❌ Generation failed%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A$(echo "$OUTPUT" | grep -i 'error\|Error' | head -1)"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" > /dev/null || true
