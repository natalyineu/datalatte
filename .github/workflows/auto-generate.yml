name: Auto-generate articles

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

concurrency:
  group: article-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-articles-workflow.js 2>&1 | tee /tmp/gen_output.txt || true

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if grep -q "Pushed" /tmp/gen_output.txt; then
            sleep 45
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          fi

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "Pushed"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed" | sed 's/.*Pushed: //')
            URL="https://www.datalatte.pro/blog/${SLUG}"

            # Poll until Vercel deployment is live (up to 5 min)
            STATUS="🔄"
            for i in $(seq 1 20); do
              sleep 15
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                STATUS="✅"
                break
              fi
            done

            if [ "$STATUS" = "✅" ]; then
              MSG="☕ New article live%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A${URL}"
            else
              MSG="⚠️ Article pushed but not live yet (Vercel deploying)%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A${URL}"
            fi
          elif echo "$OUTPUT" | grep -q "Error\|error"; then
            MSG="❌ Generation failed%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A$(echo "$OUTPUT" | grep -i error | head -1)"
          else
            MSG="⚠️ Queue empty or no article generated%0A$(date -u '+%Y-%m-%d %H:%M UTC')"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" > /dev/null || true
