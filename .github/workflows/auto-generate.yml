name: Auto-generate articles

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-articles-workflow.js 2>&1 | tee /tmp/gen_output.txt || true

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if grep -q "Pushed" /tmp/gen_output.txt; then
            sleep 65
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          fi

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "Pushed"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed" | sed 's/.*Pushed: //')
            MSG="☕ New article live%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A${SLUG}"
          elif echo "$OUTPUT" | grep -q "Error\|error"; then
            MSG="❌ Generation failed%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A$(echo "$OUTPUT" | grep -i error | head -1)"
          else
            MSG="⚠️ Queue empty or no article generated%0A$(date -u '+%Y-%m-%d %H:%M UTC')"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" > /dev/null || true
