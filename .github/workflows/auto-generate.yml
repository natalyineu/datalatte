name: Auto-generate articles

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate articles (no timeout limits!)
        id: generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(node scripts/generate-articles-workflow.js 2>&1 || true)
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          echo "$OUTPUT"

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT="${{ steps.generate.outputs.output }}"
          # Only keep the chain going if an article was generated
          if echo "$OUTPUT" | grep -q "✅ Pushed"; then
            sleep 5
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          fi

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          OUTPUT="${{ steps.generate.outputs.output }}"

          if echo "$OUTPUT" | grep -q "ERROR_"; then
            ERROR=$(echo "$OUTPUT" | grep "ERROR_" | head -1)
            MSG="❌ Generation failed%0A$ERROR"
          elif echo "$OUTPUT" | grep -q "✅ Pushed"; then
            MSG="☕ DataLatte auto-gen%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A✅ Articles generated successfully"
          else
            MSG="⚠️ No articles generated (queue may be empty)%0A$(date -u '+%Y-%m-%d %H:%M UTC')"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" > /dev/null || true
