name: Auto-generate articles

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate article 1
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://datalatte.pro/api/admin/generate-cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90) || echo -e "\ncurl_error"
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE — $BODY"

      - name: Wait 30s
        run: sleep 30

      - name: Generate article 2
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://datalatte.pro/api/admin/generate-cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90) || echo -e "\ncurl_error"
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE — $BODY"

      - name: Wait 30s
        run: sleep 30

      - name: Generate article 3
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://datalatte.pro/api/admin/generate-cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90) || echo -e "\ncurl_error"
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE — $BODY"
