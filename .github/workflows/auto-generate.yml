name: Auto-generate articles

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate article 1
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://datalatte.pro/api/cron/generate" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90) || echo -e "\ncurl_error"
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE — $BODY"

      - name: Wait 30s
        run: sleep 30

      - name: Generate article 2
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://datalatte.pro/api/cron/generate" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90) || echo -e "\ncurl_error"
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE — $BODY"

      - name: Wait 30s
        run: sleep 30

      - name: Generate article 3
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://datalatte.pro/api/cron/generate" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90) || echo -e "\ncurl_error"
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Status: $HTTP_CODE — $BODY"
          echo "LAST_STATUS=$HTTP_CODE" >> $GITHUB_ENV
          echo "LAST_BODY=$BODY" >> $GITHUB_ENV

      - name: Telegram notification
        run: |
          # Collect results from env (basic summary)
          MSG="☕ DataLatte auto-gen complete%0A3 articles generated%0A$(date -u '+%Y-%m-%d %H:%M UTC')%0A%0AView queue: https://datalatte.pro/admin"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" > /dev/null
          echo "✅ Telegram notification sent"
