name: Auto-generate articles

on:
  schedule:
    - cron: '*/5 * * * *'   # fallback every 5 min in case chain breaks
  workflow_dispatch:

concurrency:
  group: article-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-articles-workflow.js 2>&1 | tee /tmp/gen_output.txt || true

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "No pending"; then
            echo "Queue empty — not triggering next run"
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|unavailable"; then
            echo "Rate limited — waiting 3 min before next run"
            sleep 180
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          else
            echo "Triggering next run in 5 min"
            sleep 300
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
          fi

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%H:%M UTC')
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"

          send_telegram() {
            local text="$1"
            local payload
            payload=$(printf '{"chat_id":"%s","text":"%s","parse_mode":"HTML"}' \
              "$CHAT" \
              "$(echo "$text" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\n/g' | tr -d '\n' | sed 's/\\n$//')")
            curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$payload" > /dev/null || true
          }

          if echo "$OUTPUT" | grep -q "Pushed:"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed:" | sed 's/.*Pushed: //' | tr -d '[:space:]')
            TITLE=$(echo "$OUTPUT" | grep "^ARTICLE_TITLE:" | sed 's/^ARTICLE_TITLE: //')
            KEYWORD=$(echo "$OUTPUT" | grep "^ARTICLE_KEYWORD:" | sed 's/^ARTICLE_KEYWORD: //')
            CLUSTER=$(echo "$OUTPUT" | grep "^ARTICLE_CLUSTER:" | sed 's/^ARTICLE_CLUSTER: //')
            REMAINING=$(echo "$OUTPUT" | grep "^QUEUE_REMAINING:" | sed 's/^QUEUE_REMAINING: //')
            MODEL=$(echo "$OUTPUT" | grep "Model used:" | sed 's/.*Model used: //')
            URL="https://www.datalatte.pro/blog/${SLUG}"
            TEXT=$(printf "Writer - published\n%s\n\n%s\n%s\n%s\n%s\n\n%s pending\n%s" \
              "$TIME" "$TITLE" "$KEYWORD" "$CLUSTER" "$MODEL" "$REMAINING" "$URL")
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|unavailable"; then
            TEXT=$(printf "Writer - rate limited\n%s\n\nAll Groq models busy, retrying in 3 min." "$TIME")
          elif echo "$OUTPUT" | grep -q "Reset.*pending\|reset.*pending"; then
            SLUG=$(echo "$OUTPUT" | grep -i "Reset:" | head -1 | sed 's/.*Reset: //' | sed 's/ -> pending//')
            TEXT=$(printf "Writer - reset after failure\n%s\n\nArticle returned to queue: %s" "$TIME" "$SLUG")
          elif echo "$OUTPUT" | grep -q "No pending"; then
            TEXT=$(printf "Writer - queue empty\n%s\n\nAll articles published." "$TIME")
          else
            ERR=$(echo "$OUTPUT" | grep -i 'error\|Error' | head -1)
            TEXT=$(printf "Writer - failed\n%s\n\n%s" "$TIME" "$ERR")
          fi
          send_telegram "$TEXT"
