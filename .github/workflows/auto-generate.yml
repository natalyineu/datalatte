name: Auto-generate articles

on:
  schedule:
    - cron: '*/5 * * * *'   # fallback every 5 min in case chain breaks
  workflow_dispatch:

concurrency:
  group: article-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write

    steps:
      - name: ⏱ Job start
        run: |
          echo "========================================"
          echo "🚀 Auto-generate started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Runner : $RUNNER_NAME"
          echo "  Run ID : $GITHUB_RUN_ID"
          echo "========================================"

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Checkout done
        run: |
          echo "📂 Repo checked out"
          echo "  Branch : $(git rev-parse --abbrev-ref HEAD)"
          echo "  Commit : $(git rev-parse --short HEAD)"
          QUEUE=$(python3 -c "import json; d=json.load(open('content/queue.json')); pending=[x for x in d if x.get('status')=='pending']; print(f'  Queue  : {len(pending)} pending articles')" 2>/dev/null || echo "  Queue  : (could not read)")
          echo "$QUEUE"

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: ✅ Node ready
        run: echo "🟢 Node $(node -v) / npm $(npm -v)"

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "----------------------------------------"
          echo "📝 Running generate-articles-workflow.js…"
          echo "----------------------------------------"
          node scripts/generate-articles-workflow.js 2>&1 | tee /tmp/gen_output.txt || true

      - name: 📋 Generate summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          echo "========================================"
          if echo "$OUTPUT" | grep -q "Pushed:"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed:" | sed 's/.*Pushed: //' | tr -d '[:space:]')
            TITLE=$(echo "$OUTPUT" | grep "^ARTICLE_TITLE:" | sed 's/^ARTICLE_TITLE: //')
            MODEL=$(echo "$OUTPUT" | grep "Model used:" | sed 's/.*Model used: //')
            REMAINING=$(echo "$OUTPUT" | grep "^QUEUE_REMAINING:" | sed 's/^QUEUE_REMAINING: //')
            echo "✅ PUBLISHED: $TITLE"
            echo "   Slug     : $SLUG"
            echo "   Model    : $MODEL"
            echo "   Remaining: $REMAINING"
          elif echo "$OUTPUT" | grep -q "No pending"; then
            echo "🏁 Queue empty — nothing to generate"
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|quota exhausted"; then
            echo "⚡ Rate limited — all Groq models busy"
          else
            echo "⚠️  Unexpected output — last 5 lines:"
            echo "$OUTPUT" | tail -5
          fi
          echo "========================================"

      - name: Trigger next run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          if echo "$OUTPUT" | grep -q "No pending"; then
            echo "🏁 Queue empty — not triggering next run"
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|quota exhausted\|unavailable"; then
            echo "⚡ Rate limited — skipping immediate retrigger (fallback cron will resume in ≤5 min)"
          else
            echo "🔁 Triggering next run immediately…"
            gh workflow run auto-generate.yml --repo natalyineu/datalatte
            echo "✅ Next run queued"
          fi

      - name: 📊 Write job summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## ✍️ Auto-generate — $TIME"
            echo ""
            if echo "$OUTPUT" | grep -q "Pushed:"; then
              TITLE=$(echo "$OUTPUT" | grep "^ARTICLE_TITLE:" | sed 's/^ARTICLE_TITLE: //')
              SLUG=$(echo "$OUTPUT" | grep "Pushed:" | sed 's/.*Pushed: //' | tr -d '[:space:]')
              MODEL=$(echo "$OUTPUT" | grep "Model used:" | sed 's/.*Model used: //')
              REMAINING=$(echo "$OUTPUT" | grep "^QUEUE_REMAINING:" | sed 's/^QUEUE_REMAINING: //')
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Status | ✅ Published |"
              echo "| Title | $TITLE |"
              echo "| URL | [datalatte.pro/blog/$SLUG](https://datalatte.pro/blog/$SLUG) |"
              echo "| Model | $MODEL |"
              echo "| Queue remaining | $REMAINING |"
            elif echo "$OUTPUT" | grep -q "No pending"; then
              echo "🏁 **Queue empty** — no pending articles."
            elif echo "$OUTPUT" | grep -q "quota exhausted\|rate_limit"; then
              echo "⚡ **Rate limited** — all Groq models at quota."
            else
              echo "⚠️ **No article published.** Check logs above."
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Telegram notification
        if: always()
        continue-on-error: true
        run: |
          OUTPUT=$(cat /tmp/gen_output.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%H:%M UTC')
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"

          send_telegram() {
            local text="$1"
            local payload
            payload=$(printf '{"chat_id":"%s","text":"%s","parse_mode":"HTML"}' \
              "$CHAT" \
              "$(echo "$text" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\n/g' | tr -d '\n' | sed 's/\\n$//')")
            curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$payload" > /dev/null || true
          }

          if echo "$OUTPUT" | grep -q "Pushed:"; then
            SLUG=$(echo "$OUTPUT" | grep "Pushed:" | sed 's/.*Pushed: //' | tr -d '[:space:]')
            TITLE=$(echo "$OUTPUT" | grep "^ARTICLE_TITLE:" | sed 's/^ARTICLE_TITLE: //')
            KEYWORD=$(echo "$OUTPUT" | grep "^ARTICLE_KEYWORD:" | sed 's/^ARTICLE_KEYWORD: //')
            CLUSTER=$(echo "$OUTPUT" | grep "^ARTICLE_CLUSTER:" | sed 's/^ARTICLE_CLUSTER: //')
            REMAINING=$(echo "$OUTPUT" | grep "^QUEUE_REMAINING:" | sed 's/^QUEUE_REMAINING: //')
            MODEL=$(echo "$OUTPUT" | grep "Model used:" | sed 's/.*Model used: //')
            URL="https://www.datalatte.pro/blog/${SLUG}"
            TEXT=$(printf "Writer - published\n%s\n\n%s\n%s\n%s\n%s\n\n%s pending\n%s" \
              "$TIME" "$TITLE" "$KEYWORD" "$CLUSTER" "$MODEL" "$REMAINING" "$URL")
          elif echo "$OUTPUT" | grep -q "rate_limit\|All Groq models\|unavailable"; then
            TEXT=$(printf "Writer - rate limited\n%s\n\nAll Groq models busy, retrying in 3 min." "$TIME")
          elif echo "$OUTPUT" | grep -q "Reset.*pending\|reset.*pending"; then
            SLUG=$(echo "$OUTPUT" | grep -i "Reset:" | head -1 | sed 's/.*Reset: //' | sed 's/ -> pending//')
            TEXT=$(printf "Writer - reset after failure\n%s\n\nArticle returned to queue: %s" "$TIME" "$SLUG")
          elif echo "$OUTPUT" | grep -q "No pending"; then
            TEXT=$(printf "Writer - queue empty\n%s\n\nAll articles published." "$TIME")
          else
            ERR=$(echo "$OUTPUT" | grep -i 'error\|Error' | head -1)
            TEXT=$(printf "Writer - failed\n%s\n\n%s" "$TIME" "$ERR")
          fi
          send_telegram "$TEXT"

      - name: ⏱ Job end
        if: always()
        run: echo "🏁 Auto-generate finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
