name: Daily Radar Signal Collection

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC daily — after overnight news cycle
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI
    inputs:
      max_age_hours:
        description: 'How far back to look for articles (default: 26h; use 168 for 7-day catch-up)'
        required: false
        default: '26'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          SUPA_URL="${{ secrets.SUPABASE_URL }}${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          if [ -z "$SUPA_URL" ]; then
            echo "❌ Supabase URL secret is not set."
            echo "   Add SUPABASE_URL (or NEXT_PUBLIC_SUPABASE_URL) to GitHub Settings > Secrets > Actions"
            echo "   Value: https://olsxxfwvwsycwzihbmdn.supabase.co"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY secret is not set."
            echo "   Add it to GitHub Settings > Secrets > Actions"
            echo "   Value: Supabase dashboard > Settings > API > Service role (secret) key"
            exit 1
          fi
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ GROQ_API_KEY secret is not set — go to https://console.groq.com and generate a key"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Collect signals from RSS feeds
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_AGE_HOURS: ${{ github.event.inputs.max_age_hours || '26' }}
        run: node scripts/collect-signals.mjs

      - name: Insert signals into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/insert-signals.mjs
