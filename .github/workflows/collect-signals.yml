name: Daily Radar Signal Collection

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC daily — after overnight news cycle
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Collect signals from RSS feeds
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/collect-signals.mjs

      - name: Insert signals into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/insert-signals.mjs
