name: Daily Analytics Fetch

on:
  schedule:
    - cron: "0 6 * * *"   # 6am UTC every day
  workflow_dispatch:       # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install googleapis

      - name: Fetch GSC + GA4 data
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: node scripts/fetch-analytics.js

      - name: Commit analytics snapshot
        run: |
          git config user.name  "analytics-bot"
          git config user.email "analytics-bot@datalatte.pro"
          git add data/analytics/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily analytics snapshot [vercel skip]"
            git push
          fi
