name: Hourly Vercel Deploy

on:
  schedule:
    # Fire the deploy hook once per hour. All bot commits now use [vercel skip],
    # so Vercel only builds when this webhook fires — not on every git push.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" > /tmp/vercel_response.txt
          cat /tmp/vercel_response.txt

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚀 Hourly deploy triggered — ${TIME}" \
            > /dev/null || true
