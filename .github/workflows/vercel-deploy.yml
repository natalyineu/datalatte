name: Hourly Vercel Deploy

on:
  schedule:
    # Fire the deploy hook once per hour. All bot commits now use [vercel skip],
    # so Vercel only builds when this webhook fires — not on every git push.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" > /tmp/vercel_response.txt
          cat /tmp/vercel_response.txt

      - name: Wait for deploy to go live
        run: sleep 90

      - name: Ping IndexNow and sitemaps
        run: |
          BASE="https://datalatte.pro"
          KEY="0db0ab755c9749b2ba9521accb56b1dd"
          SITEMAP="${BASE}/sitemap.xml"

          # Ping Google sitemap
          curl -s "https://www.google.com/ping?sitemap=${SITEMAP}" -o /dev/null -w "Google sitemap ping: %{http_code}\n" || true

          # Ping Bing sitemap
          curl -s "https://www.bing.com/ping?sitemap=${SITEMAP}" -o /dev/null -w "Bing sitemap ping: %{http_code}\n" || true

          # Fetch sitemap once
          SITEMAP_CONTENT=$(curl -s "${BASE}/sitemap.xml")

          # Extract URLs by section (blog: 30, radar: all, service+niche+tools: key pages)
          BLOG_URLS=$(echo "$SITEMAP_CONTENT" | grep -oP '(?<=<loc>)[^<]+/blog/[^<]+' | head -30)
          RADAR_URLS=$(echo "$SITEMAP_CONTENT" | grep -oP '(?<=<loc>)[^<]+/radar/[^<]+' | grep -v 'feed\.xml' | head -50)
          SERVICE_URLS=$(echo "$SITEMAP_CONTENT" | grep -oP '(?<=<loc>)[^<]+/services/[^<]+' | head -20)
          NICHE_URLS=$(echo "$SITEMAP_CONTENT" | grep -oP '(?<=<loc>)https://datalatte\.pro/for/[^/<]+(?=<)' | head -15)
          TOOL_URLS=$(echo "$SITEMAP_CONTENT" | grep -oP '(?<=<loc>)[^<]+/tools/[^<]+' | head -5)
          STATIC_URLS=$(printf '%s\n' "${BASE}" "${BASE}/blog" "${BASE}/radar" "${BASE}/contact" "${BASE}/about" "${BASE}/pricing" "${BASE}/checklists" "${BASE}/resources")

          # Combine and deduplicate (max 100 per IndexNow request)
          ALL_URLS=$(printf '%s\n' "$BLOG_URLS" "$RADAR_URLS" "$SERVICE_URLS" "$NICHE_URLS" "$TOOL_URLS" "$STATIC_URLS" \
            | grep -v '^$' | sort -u | head -100 | jq -R . | jq -sc .)

          echo "Submitting $(echo "$ALL_URLS" | jq 'length') URLs to IndexNow"

          if [ -n "$ALL_URLS" ] && [ "$ALL_URLS" != "null" ] && [ "$ALL_URLS" != "[]" ]; then
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"datalatte.pro\",\"key\":\"${KEY}\",\"keyLocation\":\"${BASE}/${KEY}.txt\",\"urlList\":${ALL_URLS}}" \
              -w "\nIndexNow batch: %{http_code}\n" || true
          fi

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🚀 Hourly deploy triggered + IndexNow pinged — ${TIME}" \
            > /dev/null || true
