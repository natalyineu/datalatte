name: Hourly Vercel Deploy

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" > /tmp/vercel_response.txt
          cat /tmp/vercel_response.txt

      - name: Wait for deployment and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Wait for Vercel to build and deploy (poll homepage for new deployment)
          echo "Waiting for Vercel deployment..."
          DEPLOYED=false
          for i in $(seq 1 20); do
            sleep 30
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://www.datalatte.pro/" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              DEPLOYED=true
              break
            fi
          done

          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          if [ "$DEPLOYED" = "true" ]; then
            MSG="🚀 Hourly deploy complete — ${TIME}%0AAll new articles are now live on datalatte.pro"
          else
            MSG="⚠️ Vercel deploy triggered but site not responding — ${TIME}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" > /dev/null || true
