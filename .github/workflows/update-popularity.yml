name: Update Blog Popularity (GSC)

on:
  schedule:
    # Run daily at 04:00 UTC (after GSC data updates overnight)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client

      - name: Write Google token
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          echo "$GOOGLE_TOKEN_JSON" > scripts/google_token.json

      - name: Fetch GSC popularity
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python3 scripts/update_popularity.py

      - name: Commit popularity.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/popularity.json
          if git diff --cached --quiet; then
            echo "No changes to popularity.json"
          else
            git commit -m "data: refresh blog popularity from GSC [vercel skip]"
            git push
          fi
