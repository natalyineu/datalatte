name: Generate Blog Images (HF FLUX)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max images to generate (leave blank = all missing)"
        required: false
        default: "20"
      slug:
        description: "Single slug to generate (leave blank = all missing)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install HF client
        run: npm install @huggingface/inference

      - name: Generate images
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            node scripts/generate-images-hf.mjs --slug "${{ github.event.inputs.slug }}"
          else
            node scripts/generate-images-hf.mjs --limit "${{ github.event.inputs.limit }}"
          fi

      - name: Commit generated images
        run: |
          git config user.name  "DataLatte Bot"
          git config user.email "hi@datalatte.pro"
          git add public/blog/clusters/
          if git diff --staged --quiet; then
            echo "No new images to commit."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add $COUNT AI-generated blog images (FLUX Schnell)"
            git push
          fi
