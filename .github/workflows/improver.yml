name: Agent 6 — Improver

on:
  schedule:
    - cron: '0 10 * * 1'   # Monday 10am UTC
    - cron: '0 10 * * 4'   # Thursday 10am UTC
  workflow_dispatch:

concurrency:
  group: improver
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: ⏱ Job start
        run: |
          echo "========================================"
          echo "⬆️  Improver started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Run ID : $GITHUB_RUN_ID"
          echo "========================================"

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Checkout done
        run: echo "📂 Repo checked out — $(git rev-parse --short HEAD)"

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: ✅ Node ready
        run: echo "🟢 Node $(node -v)"

      - name: Run Improver Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "----------------------------------------"
          echo "⬆️  Running improver-agent.js…"
          echo "----------------------------------------"
          node scripts/improver-agent.js 2>&1 | tee /tmp/improver_output.txt || true

      - name: 📋 Improver summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/improver_output.txt 2>/dev/null || echo "")
          echo "========================================"
          echo "$OUTPUT" | grep -E "^(✅|⚠️|❌|Improved|Skipped|score)" | head -20
          echo "========================================"

      - name: 📊 Write job summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/improver_output.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## ⬆️ Improver — $TIME"
            echo ""
            echo "Articles improved: **$(echo "$OUTPUT" | grep -c '✅' || echo 0)**"
          } >> $GITHUB_STEP_SUMMARY

      - name: ⏱ Job end
        if: always()
        run: echo "🏁 Improver finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
