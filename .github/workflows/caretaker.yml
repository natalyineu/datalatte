name: Caretaker

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:

jobs:
  caretaker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write

    steps:
      - name: ⏱ Start
        run: |
          echo "🧰 Caretaker started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Run: $GITHUB_RUN_ID"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 10
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --prefer-offline 2>/dev/null || npm install --ignore-scripts

      - name: Run Caretaker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/caretaker-agent.js 2>&1 | tee /tmp/caretaker.txt || true

      - name: 📊 Write job summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/caretaker.txt 2>/dev/null || echo "")
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## 🧰 Caretaker — $TIME"
            echo ""
            echo '```'
            echo "$OUTPUT" | grep -E "^(🏁|CARETAKER_|GROQ_|═══|  [•✅⚠️📊📋🔧✨📥])" | head -40
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: ⏱ Done
        if: always()
        run: echo "🏁 Caretaker finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
