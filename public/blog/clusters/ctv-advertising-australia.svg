<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2d18"/>
      <stop offset="100%" style="stop-color:#6b4226"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" style="stop-color:#c8956c;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#4a2d18;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1a0e"/>
      <stop offset="100%" style="stop-color:#1c1008"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c9a8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#e8c9a8;stop-opacity:0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="tinyBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle top shimmer overlay -->
  <rect width="1200" height="630" fill="url(#shimmer)"/>

  <!-- Soft glow behind monitor -->
  <ellipse cx="600" cy="300" rx="320" ry="220" fill="url(#glow)"/>

  <!-- Australia map — large, soft watermark -->
  <g transform="translate(340, 110) scale(2.6)" opacity="0.07" fill="#e8c9a8" filter="url(#tinyBlur)">
    <path d="M118 2 C135 0 158 4 178 18 C198 32 205 55 204 78 C203 98 192 114 188 128 C192 140 202 152 198 165 C193 175 178 178 158 172 C145 167 130 172 112 168 C92 163 74 150 57 148 C40 146 22 155 10 147 C-1 138-3 118 5 98 C12 78 8 57 18 38 C28 19 52 8 78 4 C92 2 105 3 118 2Z"/>
  </g>

  <!-- ===== TV MONITOR ===== -->
  <!-- Soft shadow -->
  <rect x="358" y="128" width="484" height="312" rx="20" fill="#1c1008" opacity="0.5" filter="url(#softBlur)"/>

  <!-- Monitor body -->
  <rect x="360" y="118" width="480" height="298" rx="18" fill="#2c1a0e" stroke="#9a6040" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Screen -->
  <rect x="374" y="132" width="452" height="272" rx="10" fill="url(#screenBg)"/>

  <!-- Top bar — very minimal -->
  <rect x="374" y="132" width="452" height="32" rx="10" fill="#1c1008" opacity="0.7"/>
  <rect x="374" y="148" width="452" height="16" fill="#1c1008" opacity="0.7"/>
  <!-- Window dots -->
  <circle cx="396" cy="148" r="5" fill="#9a6040" opacity="0.7"/>
  <circle cx="413" cy="148" r="5" fill="#b87a50" opacity="0.7"/>
  <circle cx="430" cy="148" r="5" fill="#d4a574" opacity="0.7"/>

  <!-- Streaming platform label -->
  <rect x="720" y="138" width="90" height="20" rx="6" fill="#6b4226" opacity="0.8"/>
  <text x="765" y="152" font-family="system-ui,sans-serif" font-size="9" fill="#e8c9a8" text-anchor="middle" font-weight="700" letter-spacing="1">STREAM</text>

  <!-- Screen content area -->
  <rect x="374" y="164" width="452" height="236" fill="#140c06" opacity="0.6"/>

  <!-- Soft scan lines — very subtle -->
  <rect x="374" y="164" width="452" height="2" fill="#d4a574" opacity="0.03"/>
  <rect x="374" y="196" width="452" height="2" fill="#d4a574" opacity="0.03"/>
  <rect x="374" y="228" width="452" height="2" fill="#d4a574" opacity="0.03"/>
  <rect x="374" y="260" width="452" height="2" fill="#d4a574" opacity="0.03"/>
  <rect x="374" y="292" width="452" height="2" fill="#d4a574" opacity="0.03"/>
  <rect x="374" y="324" width="452" height="2" fill="#d4a574" opacity="0.03"/>
  <rect x="374" y="356" width="452" height="2" fill="#d4a574" opacity="0.03"/>

  <!-- Play button — clean and centered -->
  <circle cx="600" cy="278" r="44" fill="#9a6040" opacity="0.18"/>
  <circle cx="600" cy="278" r="32" fill="#9a6040" opacity="0.5"/>
  <circle cx="600" cy="278" r="32" stroke="#d4a574" stroke-width="1.5" fill="none" opacity="0.6"/>
  <polygon points="592,266 592,290 620,278" fill="#fdf8f4" opacity="0.95"/>

  <!-- Progress bar — thin and clean -->
  <rect x="374" y="392" width="452" height="3" rx="1.5" fill="#3d2410"/>
  <rect x="374" y="392" width="210" height="3" rx="1.5" fill="#d4a574" opacity="0.7"/>
  <circle cx="584" cy="393.5" r="5" fill="#e8c9a8" opacity="0.85"/>

  <!-- Time -->
  <text x="381" y="407" font-family="system-ui,sans-serif" font-size="9" fill="#9a6040" opacity="0.8">1:23</text>
  <text x="819" y="407" font-family="system-ui,sans-serif" font-size="9" fill="#9a6040" opacity="0.8" text-anchor="end">3:45</text>

  <!-- Monitor stand -->
  <rect x="572" y="418" width="56" height="10" rx="3" fill="#3d2410"/>
  <rect x="558" y="428" width="84" height="7" rx="3.5" fill="#4a2d18"/>

  <!-- ===== Floating soft pills — 3 data points ===== -->
  <!-- Left pill -->
  <rect x="110" y="255" width="170" height="64" rx="14" fill="#3d2410" opacity="0.75"/>
  <rect x="110" y="255" width="3" height="64" rx="1.5" fill="#d4a574" opacity="0.8"/>
  <text x="130" y="277" font-family="system-ui,sans-serif" font-size="10" fill="#b87a50">Avg. CPM</text>
  <text x="130" y="304" font-family="system-ui,sans-serif" font-size="26" fill="#e8c9a8" font-weight="800">$28</text>

  <!-- Right top pill -->
  <rect x="920" y="195" width="170" height="64" rx="14" fill="#3d2410" opacity="0.75"/>
  <rect x="920" y="195" width="3" height="64" rx="1.5" fill="#b87a50" opacity="0.8"/>
  <text x="940" y="217" font-family="system-ui,sans-serif" font-size="10" fill="#b87a50">View-through</text>
  <text x="940" y="244" font-family="system-ui,sans-serif" font-size="26" fill="#e8c9a8" font-weight="800">93%</text>

  <!-- Right bottom pill -->
  <rect x="920" y="325" width="170" height="64" rx="14" fill="#3d2410" opacity="0.75"/>
  <rect x="920" y="325" width="3" height="64" rx="1.5" fill="#9a6040" opacity="0.8"/>
  <text x="940" y="347" font-family="system-ui,sans-serif" font-size="10" fill="#b87a50">Budget from</text>
  <text x="940" y="374" font-family="system-ui,sans-serif" font-size="22" fill="#e8c9a8" font-weight="800">$500/mo</text>

  <!-- ===== Soft decorative dots ===== -->
  <circle cx="200" cy="140" r="60" fill="#9a6040" opacity="0.05"/>
  <circle cx="200" cy="140" r="30" fill="#b87a50" opacity="0.07"/>
  <circle cx="1000" cy="490" r="80" fill="#9a6040" opacity="0.05"/>
  <circle cx="1000" cy="490" r="40" fill="#b87a50" opacity="0.07"/>

  <!-- Small decorative rings -->
  <circle cx="160" cy="470" r="20" stroke="#9a6040" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="160" cy="470" r="12" stroke="#b87a50" stroke-width="1" fill="none" opacity="0.15"/>
  <circle cx="1050" cy="155" r="20" stroke="#9a6040" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="1050" cy="155" r="12" stroke="#b87a50" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Category label top left -->
  <rect x="55" y="48" width="140" height="32" rx="16" fill="#9a6040" opacity="0.9"/>
  <text x="125" y="68" font-family="system-ui,sans-serif" font-size="12" fill="#fdf8f4" text-anchor="middle" font-weight="700">📺 CTV · Australia</text>

  <!-- Signal bars top right -->
  <g transform="translate(1095, 42)" opacity="0.45">
    <rect x="0" y="16" width="7" height="10" rx="1.5" fill="#9a6040"/>
    <rect x="11" y="10" width="7" height="16" rx="1.5" fill="#b87a50"/>
    <rect x="22" y="4" width="7" height="22" rx="1.5" fill="#d4a574"/>
    <rect x="33" y="0" width="7" height="26" rx="1.5" fill="#e8c9a8"/>
  </g>
</svg>
